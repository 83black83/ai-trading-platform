# Agents Configuration - AI Trading Platform

llm:
  model: gpt-4o
  temperature: 0.1
  max_tokens: 2000
  timeout_seconds: 60
  retry_attempts: 2

agents:
  technical_analyst:
    enabled: true
    weight: 0.25
    indicators:
      - RSI
      - MACD
      - BB
      - EMA_20
      - EMA_50
      - ATR
      - VWAP
      - OBV
    lookback_days: 60

  news_analyst:
    enabled: true
    weight: 0.20
    lookback_hours: 24
    max_articles: 20
    sources:
      - newsapi
      - finnhub
    sentiment_threshold: 0.3

  sentiment_analyst:
    enabled: true
    weight: 0.20
    lookback_hours: 48
    min_data_points: 5

  bull_researcher:
    enabled: true
    weight: 0.15
    min_arguments: 3
    max_arguments: 7

  bear_researcher:
    enabled: true
    weight: 0.15
    min_arguments: 3
    max_arguments: 7

  risk_agent:
    enabled: true
    weight: 0.0
    is_gatekeeper: true

  portfolio_manager:
    enabled: true
    final_approver: true
    min_conviction_score: 0.65

workflow:
  parallel_analysts: true
  debate_rounds: 1
  require_unanimous_risk: true
  decision_timeout_seconds: 120
  log_all_agent_outputs: true
  save_decision_rationale: true
