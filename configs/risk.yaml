# Risk Engine Configuration - AI Trading Platform

# Limiti portafoglio
max_positions: 3
max_position_size_pct: 0.10
max_sector_exposure_pct: 0.35
allow_short: false
allow_leverage: false
max_leverage_ratio: 1.0

# Limiti di perdita
max_daily_loss_pct: 0.02
max_weekly_loss_pct: 0.05
max_total_drawdown_pct: 0.08
stop_loss_per_trade_pct: 0.03
trailing_stop_pct: 0.05

# Approvazione trade
require_risk_approval: true
min_agent_confidence: 0.65
min_agents_agreement: 3
min_signal_quality: 0.60

# Kill switch automatici
kill_switch_on_data_failure: true
kill_switch_on_broker_error: true
kill_switch_on_daily_loss: true
kill_switch_on_drawdown: true
kill_switch_on_high_volatility: false
vix_threshold_kill: 35

# Cooldown
cooldown_minutes_after_loss: 60
cooldown_minutes_after_kill: 240
cooldown_minutes_between_trades: 30

# Concentrazione
max_single_sector_trades: 2
min_diversification_assets: 2

# Sizing
default_position_size_pct: 0.05
max_position_size_pct: 0.10
size_by_confidence: true
size_by_volatility: true
